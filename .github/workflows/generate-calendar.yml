        python scrapers/editor_publisher.py --output cities/publisher-resources/editor_publisher.ics || true
        # Center for Cooperative Media — Eventbrite organizer
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/center-for-cooperative-media-5988913981" --name "Center for Cooperative Media" --output cities/publisher-resources/eventbrite_coop_media.ics || true
        # Associated Press — Eventbrite organizer
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/72823983313" --name "Associated Press" --output cities/publisher-resources/eventbrite_ap.ics || true
        # ONA (Online News Association) — HTML scraper (Novi AMS, no feeds)
        python scrapers/ona_events.py --output cities/publisher-resources/ona_events.ics || true
        python scrapers/knight_center.py --output cities/publisher-resources/knight_center.ics || true
      continue-on-error: true

    - name: Fetch Publisher Resources live feeds
      if: contains(steps.locations.outputs.list, 'publisher-resources') && github.event.inputs.regenerate_only != 'true'
      run: |
        cd cities/publisher-resources
        # INN (Institute for Nonprofit News) — WordPress Tribe Events
        curl -sL -A "Mozilla/5.0" "https://inn.org/events/list/?ical=1" -o inn.ics || true
        # SPJ (Society of Professional Journalists) — custom calendar
        curl -sL "https://calendar.spjnetwork.org/calendar.php" -o spj.ics || true
        # Poynter Institute — WordPress Tribe Events
        curl -sL -A "Mozilla/5.0" "https://www.poynter.org/events/?ical=1" -o poynter.ics || true
        # NAHJ (National Assoc. of Hispanic Journalists) — WordPress Tribe Events
        curl -sL -A "Mozilla/5.0" "https://nahj.org/events/?ical=1" -o nahj.ics || true
        # NLGJA (Assoc. of LGBTQ+ Journalists) — WordPress Tribe Events
        curl -sL -A "Mozilla/5.0" "https://www.nlgja.org/events/?ical=1" -o nlgja.ics || true
        # AHCJ (Assoc. of Health Care Journalists) — WordPress Tribe Events
        curl -sL -A "Mozilla/5.0" "https://healthjournalism.org/events/?ical=1" -o ahcj.ics || true
        # SABEW (Soc. for Advancing Business Editing & Writing) — WordPress Tribe Events (alternate URL bypasses Cloudflare)
        curl -sL -A "Mozilla/5.0" "https://sabew.org/?post_type=tribe_events&ical=1&eventDisplay=list" -o sabew.ics || true
        # Hacks/Hackers — Luma calendar ICS feed
        curl -sL "https://api2.luma.com/ics/get?entity=calendar&id=cal-09kcgQfLYGyy2JP" -o hackshackers.ics || true
        # Tiny News Members Only (Google Calendar)
        curl -sL "https://calendar.google.com/calendar/ical/c_3ef2026db19c41c73cb8ed72bbde7f163008de761ce942a9ad334f5b8993e652%40group.calendar.google.com/public/basic.ics" -o tiny_news_members_only.ics || true
        # Journalism Internship & Fellowship Deadlines (Google Calendar)
        curl -sL "https://calendar.google.com/calendar/ical/er06vtjd12h86b4rej5bts6p6c%40group.calendar.google.com/public/basic.ics" -o journalism_deadlines.ics || true
        cd ../..

    - name: Combine Publisher Resources ICS files
      if: contains(steps.locations.outputs.list, 'publisher-resources')
      run: |
        python scripts/combine_ics.py --input-dir cities/publisher-resources --output cities/publisher-resources/combined.ics --name "Publisher Resources Calendar"

    # ==========================================
    # Post-processing (all cities)
    # ==========================================
    - name: Convert ICS to JSON for Supabase
      run: |
        IFS=',' read -ra CITIES <<< "${{ steps.locations.outputs.list }}"
        echo "Processing cities: ${CITIES[*]}"
        for city in "${CITIES[@]}"; do
          city=$(echo "$city" | xargs)
          echo "Checking city: '$city'"
          # Save previous events.json (with categories) before overwriting
          if [ -f "cities/$city/events.json" ]; then
            cp "cities/$city/events.json" "cities/$city/events.prev.json"
          fi
          if [ -f "cities/$city/combined.ics" ]; then
            echo "Running ics_to_json for $city..."
            python scripts/ics_to_json.py "cities/$city/combined.ics" -o "cities/$city/events.json" --city "$city"
            echo "$city: Converted $(cat cities/$city/events.json | python -c 'import json,sys; print(len(json.load(sys.stdin)))') events to JSON"
            # Carry forward categories from previous build
            if [ -f "cities/$city/events.prev.json" ]; then
              python scripts/merge_categories.py "cities/$city/events.prev.json" "cities/$city/events.json"
              rm "cities/$city/events.prev.json"
            fi
          else
            echo "WARNING: cities/$city/combined.ics not found!"
            # Clean up prev file if no combined.ics
            rm -f "cities/$city/events.prev.json"
          fi
        done

    - name: Classify events in JSON files
      if: env.ANTHROPIC_API_KEY
      run: |
        IFS=',' read -ra CITIES <<< "${{ steps.locations.outputs.list }}"
        FILES=""
        for city in "${CITIES[@]}"; do
          city=$(echo "$city" | xargs)
          if [ -f "cities/$city/events.json" ]; then
            FILES="$FILES cities/$city/events.json"
          fi
        done
        if [ -n "$FILES" ]; then
          python scripts/classify_events_json.py $FILES
        fi

    - name: Generate feed health report
      run: |
        python scripts/report.py --cities ${{ steps.locations.outputs.list }} --build-log build.log

    - name: Generate PRODID platform report
      run: python scripts/prodid.py

    - name: Validate pipeline output
      run: |
        python scripts/validate_pipeline.py --cities ${{ steps.locations.outputs.list }}

    - name: Commit and push if changes
      env:
        GITHUB_TOKEN: ${{ secrets.COMMUNITY_CALENDAR }}
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        
        # Save generated files before any git operations
        for city in bloomington petaluma roanoke matsu jweekly evanston portland boston publisher-resources; do
          if [ -f "cities/$city/events.json" ]; then
            cp "cities/$city/events.json" "/tmp/${city}_events.json"
          fi
        done
        
        # Write version tag for cache busting
        git describe --tags --always > version.txt

        git add .
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "Auto-generate calendar"
          for i in 1 2 3; do
            git add -A
            if git pull --rebase --autostash && git push; then
              break
            fi
            echo "Push failed, restoring generated files and retrying..."
            # Restore generated files that may have been clobbered by rebase
            for city in bloomington petaluma roanoke matsu jweekly evanston portland boston publisher-resources; do
              if [ -f "/tmp/${city}_events.json" ]; then
                cp "/tmp/${city}_events.json" "cities/$city/events.json"
              fi
            done
            git add .
            git diff --staged --quiet || git commit --amend --no-edit
            sleep 5
          done
        )

    - name: Trigger Supabase events reload
      env:
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        echo "Triggering Supabase Edge Function to reload events..."
        RESPONSE=$(curl -sL -X POST "${{ vars.SUPABASE_URL }}/functions/v1/load-events" \
          -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
          -H 'Content-Type: application/json')
        echo "$RESPONSE" | jq .

        # Check for success
        SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
        if [ "$SUCCESS" = "true" ]; then
          INSERTED=$(echo "$RESPONSE" | jq -r '.inserted')
          echo "Successfully loaded $INSERTED events into Supabase"
        else
          echo "Failed to load events"
          echo "$RESPONSE"
          exit 1
        fi

