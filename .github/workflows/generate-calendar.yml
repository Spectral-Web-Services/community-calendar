name: Generate Calendar

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      locations:
        description: 'Locations to process (comma-separated: bloomington,petaluma,portland,jweekly,evanston,publisher-resources or "all")'
        required: false
        default: 'all'
      regenerate_only:
        description: 'Skip scraping, only regenerate from existing local ICS files'
        required: false
        type: boolean
        default: false
      months:
        description: 'Number of months ahead to scrape (default: 2)'
        required: false
        default: '2'
  schedule:
    - cron: '0 0 * * *'

jobs:
  generate-calendar:
    runs-on: ubuntu-latest
    env:
      SCRAPE_MONTHS: ${{ github.event.inputs.months || '2' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_KEY: ${{ vars.SUPABASE_KEY }}
      #ENABLE_FUZZY_DEDUP: ${{ secrets.ANTHROPIC_API_KEY && 'true' || '' }}

    steps:
    - name: Check out repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxml2-dev libxslt-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up build logging
      run: |
        > $GITHUB_WORKSPACE/build.log
        echo 'exec 2> >(tee -a $GITHUB_WORKSPACE/build.log >&2)' > /tmp/bash_env.sh
        echo "BASH_ENV=/tmp/bash_env.sh" >> $GITHUB_ENV

    - name: Determine locations to process
      id: locations
      run: |
        INPUT="${{ github.event.inputs.locations }}"
        if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
          # Derive city list from cities/ directory (any subdir with a feeds.txt)
          ALL=$(ls -d cities/*/feeds.txt 2>/dev/null | sed 's|cities/||;s|/feeds.txt||' | paste -sd, -)
          echo "list=$ALL" >> $GITHUB_OUTPUT
        else
          echo "list=$INPUT" >> $GITHUB_OUTPUT
        fi

    # ==========================================
    # Bloomington
    # ==========================================
    - name: Scrape Bloomington sources
      if: contains(steps.locations.outputs.list, 'bloomington') && github.event.inputs.regenerate_only != 'true'
      env:
        TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
      run: |
        echo "Scraping Bloomington..."
        python scripts/library_intercept.py --location bloomington --output cities/bloomington/library_intercept.ics || true
        python scrapers/buskirk_chumley.py --output cities/bloomington/buskirk_chumley.ics || true
        python scrapers/comedy_attic.py --output cities/bloomington/comedy_attic.ics || true
        python scrapers/the_bishop.py --output cities/bloomington/the_bishop.ics || true
        python scrapers/squarespace.py --url "https://www.peoplesmarketbtown.org/gatherings" --name "People's Market" -o cities/bloomington/peoples_market.ics || true
        python scrapers/the_bluebird.py -o cities/bloomington/the_bluebird.ics || true
        python scrapers/songkick.py --url "https://www.songkick.com/venues/3607354-blockhouse-bar" --name "Blockhouse Bar" --output cities/bloomington/songkick_blockhouse.ics || true
        python scrapers/squarespace.py --url "https://www.cardinalspirits.com/events" --name "Cardinal Spirits" -o cities/bloomington/cardinal_spirits.ics || true
        python scrapers/squarespace.py --url "https://www.sassafrasaudubon.org/upcomingevents" --name "Sassafras Audubon Society" -o cities/bloomington/sassafras_audubon.ics || true
        python scrapers/squarespace.py --url "https://www.mcmga.net/events" --name "Monroe County Master Gardeners" -o cities/bloomington/master_gardeners.ics || true
        python scrapers/sycamore_land_trust.py --output cities/bloomington/sycamore_land_trust.ics || true
        python scrapers/spektrix.py --base-url "https://tickets.seeconstellation.org/constellation" --name "Constellation Stage & Screen" --output cities/bloomington/constellation.ics || true
        python scrapers/shopify_events.py --url "https://cicadacinema.com" --name "Cicada Cinema" --output cities/bloomington/cicada_cinema.ics || true
      continue-on-error: true

    - name: Download Bloomington live feeds and combine ICS
      if: contains(steps.locations.outputs.list, 'bloomington')
      run: |
        cd cities/bloomington
        curl -sL "https://bgcbloomington.org/events/list/?ical=1" -o bgc_bloomington.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_1b95au4d2ueudldosb024fimp0@group.calendar.google.com/public/basic.ics" -o bloomington_gov.ics || true
        curl -sL "https://tockify.com/api/feeds/ics/bloomington.arts.calendar" -o bloomington_arts.ics || true
        # IU LiveWhale feeds
        curl -sL "https://events.iu.edu/live/ical/events/group_id/56" -o iu_jacobs_music.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/378" -o iu_auditorium.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/234" -o iu_eskenazi_museum.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/81" -o iu_cinema.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/59" -o iu_la_casa.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/64" -o iu_maurer_law.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/343" -o iu_kelley_business.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/130" -o iu_arts_humanities.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/261" -o iu_libraries.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/218" -o iu_theatre_dance.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/314" -o iu_asian_culture.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/275" -o iu_first_nations.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/237" -o iu_lgbtq_culture.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/221" -o iu_black_film.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/235" -o iu_neal_marshall.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/135" -o iu_hamilton_lugar.ics || true
        # B-Square Bulletin Google Calendars
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_35a6qiaiperdn7b1r6v2ksjlig@group.calendar.google.com/public/basic.ics" -o bsquare_government.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/4dj0guhji982ca5k90ljeliul0@group.calendar.google.com/public/basic.ics" -o bsquare_misc_civic.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/2gd73d7gc46mstrdnr6k7v7b2o@group.calendar.google.com/public/basic.ics" -o bsquare_critical_mass.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/c_02o6fd3erhdmhe4oc5so149ir0@group.calendar.google.com/public/basic.ics" -o bsquare_bptc.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/d1087e97d4ace1c1ca2dd6336d417bea870ddac277be6d1711cbc0235aa85228%40group.calendar.google.com/public/basic.ics" -o btonline_events.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/j6botrehcce8vobqe6vpb4hnhk%40group.calendar.google.com/public/basic.ics" -o btonline_food.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/2db8c2cf65a3558e38c4caaea43cb56e722090235237a95f137b087306353e51%40group.calendar.google.com/public/basic.ics" -o btonline_shopping.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/7caed316def2d08d50353450a5376bb55f042ad0d7edaba097283a9a11758082%40group.calendar.google.com/public/basic.ics" -o btonline_music.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_1rosks8nont4ebaq41tfgg8v7g@group.calendar.google.com/public/basic.ics" -o parks_and_rec.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/knobstone-hiking-trail-association-of-indiana-meetup/events/ical/" -o meetup_knobstone_hiking_trail_association_of_indiana_meetup.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/Bloomington-Atheists-and-Rationally-Awesome-People/events/ical/" -o meetup_bloomington_atheists_and_rationally_awesome_people.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_0l6e93fe54psagva4dhojra2q0@group.calendar.google.com/public/basic.ics" -o farmers_market.ics || true
        curl -sL "https://www.lotusfest.org/events/?ical=1" -o lotusfest.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/cuc66guoam1hhcqq2rnaniinl8%40group.calendar.google.com/public/basic.ics" -o calendar_cuc66guoam1hhcqq2rnaniinl8_40group_calend.ics || true
        # IU LibCal feeds
        curl -sL "https://iub.libcal.com/ical_subscribe.php?src=p&cid=5914" -o iu_libcal_screening_room.ics || true
        curl -sL "https://iub.libcal.com/ical_subscribe.php?src=p&cid=1228" -o iu_libcal_scholars_commons.ics || true
        # CampusLabs / beINvolved (student org events — API scraper for images)
        cd ../..
        python scrapers/campuslabs.py --base-url "https://iub.campuslabs.com/engage" --name "IU beINvolved Student Orgs" --timezone America/Indiana/Indianapolis -o cities/bloomington/iu_campuslabs.ics || true
        cd cities/bloomington
        # Monroe County Public Library (Communico iCal feed — all locations, all ages, 90 days)
        curl -sL "https://calendar.mcpl.info/feeds?data=eyJmZWVkVHlwZSI6ImljYWwiLCJmaWx0ZXJzIjp7ImxvY2F0aW9uIjpbImFsbCJdLCJhZ2VzIjpbImFsbCJdLCJ0eXBlcyI6WyJhbGwiXSwidGFncyI6W10sInRlcm0iOiIiLCJkYXlzIjo5MH19" -o mcpl.ics || true
        # Community ICS feeds
        curl -sL "https://wonderlab.org/events/?ical=1" -o wonderlab.ics || true
        curl -sL "https://firstuc.org/events/?ical=1" -o first_united_church.ics || true
        curl -sL "https://www.bloomingtoncommunityband.org/events/?ical=1" -o community_band.ics || true
        curl -sL "https://browncountyplayhouse.org/events/?ical=1" -o brown_county_playhouse.ics || true
        curl -sL "https://uplandbeer.com/events/?ical=1" -o upland_brewing.ics || true
        # Google Calendar feeds
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_r7b1mkrme1r8uhl3b5amhb50bc@group.calendar.google.com/public/basic.ics" -o city_boards_commissions.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloominglabs%40gmail.com/public/basic.ics" -o bloominglabs.ics || true
        # Meetup feeds (Board Games: 403 private; Remote Workers: dormant — removed 2026-03)

        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_c657mi332p5sjpq2lcht9imu60%40group.calendar.google.com/public/basic.ics" -o calendar_bloomington_in_gov_c657mi332p5sjpq2lcht9i.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/shweekend%40gmail.com/public/basic.ics" -o calendar_shweekend_40gmail_com_public.ics || true
        curl -sL "https://writersguildbloomington.com/?plugin=all-in-one-event-calendar&controller=ai1ec_exporter_controller&action=export_events&no_html=true" -o writersguildbloomington.ics || true
        curl -sL "https://bloomspinweave.org/?post_type=tribe_events&ical=1&eventDisplay=list" -o bloomspinweave.ics || true
        curl -sL "https://www.hoosierflyfishers.com/events/list/?ical=1" -o hoosierflyfishers_list.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/r5lf3al9blontcsjnedbr2f2u0%40group.calendar.google.com/public/basic.ics" -o calendar_r5lf3al9blontcsjnedbr2f2u0_40group_calend.ics || true
        cd ../..
        # Ticketmaster (requires TICKETMASTER_API_KEY secret)
        if [ -n "$TICKETMASTER_API_KEY" ]; then
          python scrapers/ticketmaster.py --latlong 39.1653,-86.5264 --radius 10 --name "Ticketmaster Bloomington" --timezone America/Indiana/Indianapolis -o cities/bloomington/ticketmaster_bloomington.ics || true
        fi
        # Monroe Convention Center (RSS feed)
        python scrapers/bloomington_convention.py -o cities/bloomington/bloomington_convention.ics || true
        # Greater Bloomington Chamber of Commerce (mobile events page)
        python scrapers/chamber_bloomington.py -o cities/bloomington/chamber_bloomington.ics || true
        # Indivisible South Central Indiana (Mobilize.us)
        python scrapers/mobilize.py --org-id 43350 --name "Indivisible SCI" --timezone America/Indiana/Indianapolis -o cities/bloomington/mobilize_indivisible_sci.ics || true
        # McCormick's Creek State Park (Indiana DNR Localist feed)
        curl -sL "https://events.in.gov/dnr/calendar.ics?event_types=35121259147310&days=90&search=mccormick" -o mccormicks_creek.ics || true
        # IU Athletics (Sidearm v3 API — home games only)
        python scrapers/sidearm.py --base-url https://iuhoosiers.com --name "IU Athletics" --timezone America/Indiana/Indianapolis --home-only -o cities/bloomington/iu_athletics.ics || true
        # CitySpark (community-submitted events with images)
        python scrapers/cityspark/bloomington.py -o cities/bloomington/cityspark_bloomington.ics || true
        # Visit Bloomington (Simpleview CMS — tourism board events with images)
        python scrapers/visitbloomington.py -o cities/bloomington/visitbloomington.ics || true
        # Eventbrite organizers (images included via JSON-LD)
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/24897361037" --name "Blueline Bloomington" -o cities/bloomington/eventbrite_blueline.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/18076093080" --name "Big Red Liquors" -o cities/bloomington/eventbrite_big_red_liquors.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/106566049911" --name "The Afrobellas At IU" -o cities/bloomington/eventbrite_afrobellas.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/34376767621" --name "Morgenstern Books" -o cities/bloomington/eventbrite_morgenstern_books.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/95199764993" --name "Nerd Nite Bloomington" -o cities/bloomington/eventbrite_nerd_nite.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/31640015525" --name "Gallery at the Vault" -o cities/bloomington/eventbrite_gallery_vault.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/102507618371" --name "Falun Dafa Club at IU" -o cities/bloomington/eventbrite_falun_dafa.ics || true
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/106576693901" --name "Reviving Hope for the Nations" -o cities/bloomington/eventbrite_reviving_hope.ics || true
        python scripts/enrich_meetup_images.py --dir cities/bloomington || true
        python scripts/enrich_meetup_images.py --any-url \
          cities/bloomington/buskirk_chumley.ics \
          cities/bloomington/comedy_attic.ics \
          cities/bloomington/the_bishop.ics \
          cities/bloomington/cicada_cinema.ics \
          cities/bloomington/peoples_market.ics \
          cities/bloomington/cardinal_spirits.ics \
          cities/bloomington/sassafras_audubon.ics \
          cities/bloomington/master_gardeners.ics \
          cities/bloomington/sycamore_land_trust.ics \
          cities/bloomington/the_bluebird.ics \
          cities/bloomington/songkick_blockhouse.ics || true
        python scripts/combine_ics.py --input-dir cities/bloomington --output cities/bloomington/combined.ics --name "Bloomington Community Calendar"

    # ==========================================
    # Petaluma
    # ==========================================
    - name: Scrape Petaluma sources
      if: contains(steps.locations.outputs.list, 'petaluma') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Petaluma..."
        python scripts/library_intercept.py --location petaluma --output cities/petaluma/library_intercept.ics || true
        python scrapers/mystic_theatre.py --output cities/petaluma/mystic_theatre.ics || true
        # High school athletics
        python scrapers/maxpreps.py --school petaluma-trojans --output cities/petaluma/maxpreps_petaluma_high.ics || true
        python scrapers/maxpreps.py --school casa-grande-gauchos --output cities/petaluma/maxpreps_casa_grande.ics || true
        # Petaluma Chamber of Commerce (GrowthZone)
        python scrapers/growthzone.py --site petalumachamber --output cities/petaluma/petaluma_chamber.ics || true
        # HenHouse Brewing and Phoenix Theater
        python scrapers/henhouse.py > cities/petaluma/henhouse.ics || true
        # Mercury Theater and Adobe Road Winery
        python scrapers/mercury_theater.py --output cities/petaluma/mercury_theater.ics || true
        python scrapers/adobe_road.py --output cities/petaluma/adobe_road.ics || true
        # Squarespace venues
        python scrapers/petaluma_arts_center.py --output cities/petaluma/petaluma_arts_center.ics || true
        python scrapers/brewsters.py --output cities/petaluma/brewsters.ics || true
        python scrapers/cool_petaluma.py --output cities/petaluma/cool_petaluma.ics || true
        python scrapers/petaluma_river_park.py --output cities/petaluma/petaluma_river_park.ics || true
        # Blue Zones Project Petaluma (Eventbrite)
        python scrapers/eventbrite.py --url "https://www.eventbrite.com/o/78957912343" --name "Blue Zones Project Petaluma" --output cities/petaluma/bluezones_petaluma.ics || true
      continue-on-error: true

    - name: Download Petaluma live feeds and combine ICS
      if: contains(steps.locations.outputs.list, 'petaluma')
      run: |
        cd cities/petaluma
        # Tockify feeds
        curl -sL "https://tockify.com/api/feeds/ics/pdaevents" -o petaluma_downtown.ics || true
        # Aqus Community (MembershipWorks)
        curl -sL "https://api.membershipworks.com/v2/events?_op=ics&org=15499" -o aqus_community.ics || true
        # Meetup groups
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/mindfulnesspetaluma/events/ical/" -o meetup_mindful_petaluma.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/the-rebel-craft-collective/events/ical/" -o meetup_rebel_craft.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/meetup-group-bwkyqavs/events/ical/" -o meetup_candlelight_yoga.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/petaluma-figure-drawing-meetup-group/events/ical/" -o meetup_figure_drawing.ics || true
        # Additional Meetup groups
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/petaluma-book-and-brew-club/events/ical/" -o meetup_book_brew.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/petaluma-active-20-30/events/ical/" -o meetup_active_20_30.ics || true
        # SRJC Petaluma (LiveWhale ICS feed — filtered by combine_ics geo)
        curl -sL "https://calendar.santarosa.edu/live/ical/events" -o srjc_petaluma.ics || true
        # Regional Meetup groups with Petaluma events
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/sonoma-county-outdoors/events/ical/" -o meetup_sonoma_outdoors.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/meditate-with-a-monk-in-sonoma-county/events/ical/" -o meetup_meditate_monk.ics || true
        # The Big Easy (WordPress + The Events Calendar iCal feed)
        curl -sL "https://bigeasypetaluma.com/events/?ical=1" -o bigeasy.ics || true
        # Polly Klaas Community Theater (WordPress + The Events Calendar iCal feed)
        curl -sL "https://pollyklaastheater.org/events/?ical=1" -o polly_klaas.ics || true
        # Brooks Note Winery (public Google Calendar ICS feed)
        curl -sL "https://calendar.google.com/calendar/ical/c_69dcaa6c13b06c1111a1706565ebb272c3d24290c650a9378bdbd37bff886879%40group.calendar.google.com/public/basic.ics" -o brooksnote.ics || true
        # McNear's Saloon (WordPress + The Events Calendar iCal feed)
        curl -sL "https://www.mcnears.com/event/?ical=1" -o mcnears.ics || true
        # Griffo Distillery (Tockify ICS feed)
        curl -sL "https://tockify.com/api/feeds/ics/tom.l" -o griffo.ics || true
        # Petaluma Elks Lodge (public Google Calendar ICS feed)
        curl -sL "https://calendar.google.com/calendar/ical/elks0901%40gmail.com/public/basic.ics" -o elks_lodge.ics || true
        # Petaluma Garden Club (public Google Calendar ICS feed)
        curl -sL "https://calendar.google.com/calendar/ical/petalumagardenclub%40gmail.com/public/basic.ics" -o garden_club.ics || true
        # Petaluma Bounty (WordPress Events Manager iCal feed)
        curl -sL "https://petalumabounty.org/events-calendar/?ical=1" -o petaluma_bounty.ics || true
        # Petaluma Historical Library & Museum (WordPress + The Events Calendar iCal feed)
        curl -sL "https://petalumamuseum.com/events/?ical=1" -o petaluma_museum.ics || true
        cd ../..
        python scripts/enrich_meetup_images.py --dir cities/petaluma || true
        python scripts/combine_ics.py --input-dir cities/petaluma --output cities/petaluma/combined.ics --name "Petaluma Community Calendar"

    # ==========================================
    # Roanoke
    # ==========================================
    - name: Scrape Roanoke sources
      if: contains(steps.locations.outputs.list, 'roanoke') && github.event.inputs.regenerate_only != 'true'
      run: |
        python scrapers/growthzone.py --url "https://business.roanokechamber.org/api/events" --name "Roanoke Regional Chamber" --output cities/roanoke/roanoke_chamber.ics || true
        curl -sL "https://eb-to-ical.daylightpirates.org/eventbrite-organizer-ical?organizer=3245496552" -o roanoke_higher_ed_center.ics || true
        python scrapers/taubman_museum.py --output cities/roanoke/taubman_museum.ics || true

    - name: Download Roanoke live feeds and combine ICS
      if: contains(steps.locations.outputs.list, 'roanoke')
      run: |
        cd cities/roanoke
        # City of Salem (CivicPlus)
        curl -sL "https://www.salemva.gov/common/modules/iCalendar/iCalendar.aspx?catID=14&feed=calendar" -o salem_main_calendar.ics || true
